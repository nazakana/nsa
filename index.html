<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NSA - Nurjaya Smart Archive</title>
	
    <meta name="description" content="Website Official Arsip Operasional Nurjaya. Dibuat untuk mempermudah pemantauan Pembukuan Bulanan dan sebagai Arsip Riwayat Keuangan di Nurjaya Abadi Photocopy.">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#2DCC70">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1hPgmkU4MertGor-v5QOCQ9sLM2tyYamk">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 16px;
            width: 100%;
            height: 100vh;
            /* Latar belakang gradasi hijau khas Nurjaya */
            background: linear-gradient(to bottom, #2ecc71 0%, #f4f4f4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            overflow: hidden;
        }
        
        /* Animasi Slide Up Halus saat Pintu Gerbang Terbuka */
        @keyframes nsaModalSlideUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .nsa-container {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
            animation: nsaModalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .nsa-header {
            padding: 45px 20px 25px 20px;
            text-align: center;
        }
        
        .nsa-logo-box {
            width: 72px;
            height: 72px;
            background: #ffffff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        .nsa-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .nsa-title {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        
        .nsa-subtitle {
            margin: 8px 0 0 0;
            font-size: 14px;
            color: #9ca3af;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        
        .nsa-body {
            padding: 10px 28px 45px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .nsa-section-tag {
            margin: 0 0 4px 0;
            font-size: 10px;
            color: #d1d5db;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
        }
        
        /* Base gaya tombol pilihan */
        .btn-unit {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 18px 26px;
            border: none;
            color: white;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            text-decoration: none;
        }
        
        /* Tombol Unit Fotokopi (Biru) */
        .btn-fotokopi {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn-fotokopi:hover {
            background: #1d4ed8;
            transform: translateY(-1.5px);
        }
        
        /* Tombol Unit Apotek (Hijau) */
        .btn-apotek {
            background: #16a34a;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.25);
        }
        .btn-apotek:hover {
            background: #15803d;
            transform: translateY(-1.5px);
        }
        
        .btn-text {
            font-weight: 700;
            font-size: 12px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        
        .icon-wrapper {
            width: 24px;
            display: flex;
            justify-content: center;
        }
        
        .chevron-right {
            margin-left: auto;
            opacity: 0.5;
            font-size: 11px;
        }
        
        .nsa-footer {
            padding: 22px;
            background: #fafafa;
            text-align: center;
            border-top: 1px solid #f3f4f6;
        }
        
        .copyright {
            color: #d1d5db;
            font-size: 9px;
            margin-top: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <div class="nsa-bg-decorations">
        <i class="fas fa-cloud decor-icon icon-pos-1"></i>
        <i class="fas fa-database decor-icon icon-pos-2"></i>
        <i class="fas fa-folder-open decor-icon icon-pos-3"></i>
        <i class="fas fa-network-wired decor-icon icon-pos-4"></i>

        <i class="fas fa-file-invoice decor-icon icon-pos-5"></i>
        <i class="fas fa-capsules decor-icon icon-pos-6"></i>
        <i class="fas fa-prescription-bottle-alt decor-icon icon-pos-7"></i>
        <i class="fas fa-copy decor-icon icon-pos-8"></i>
    </div>

    <div class="nsa-container animate-portal-in">
        
        <div class="nsa-header">
            <div class="nsa-logo-box pulse-logo">
                <img src="https://lh3.googleusercontent.com/d/1YzO1wQlp14cnaME86W-WD-TaNLEsLi85" alt="NSA Logo">
            </div>
            <h2 class="nsa-title animate-text-delay-1">SELAMAT DATANG DI</h2>
            <p class="nsa-subtitle animate-text-delay-2">Nurjaya Smart Archive</p>
        </div>

        <div class="nsa-body">
            <p class="nsa-section-tag animate-text-delay-2">PILIH UNIT KERJA</p>

            <button onclick="pilihUnitNSA('fotokopi', 'fotokopi-nurjaya.html')" class="btn-unit btn-fotokopi group">
                <div class="icon-wrapper"><i class="fas fa-print style-icon"></i></div>
                <span class="btn-text">NURJAYA ABADI PHOTOCOPY</span>
                <i class="fas fa-chevron-right chevron-right"></i>
            </button>

            <button onclick="pilihUnitNSA('apotek', 'apotek-nurjaya.html')" class="btn-unit btn-apotek group">
                <div class="icon-wrapper"><i class="fas fa-flask style-icon"></i></div>
                <span class="btn-text">APOTEK NURJAYA</span>
                <i class="fas fa-chevron-right chevron-right"></i>
            </button>
        </div>

        <div class="nsa-footer">
            <div class="copyright">© NURJAYA 2026</div>
        </div>
        
    </div>

    <style>
        /* ========================================================================= */
        /* REVISI TOTAL: DEKORASI PUTIH KONTRASTIF & MATRIKS ANIMASI                 */
        /* ========================================================================= */
        .nsa-bg-decorations {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* UBAH TOTAL KE PUTIH: Menggunakan warna putih solid dengan opasitas 0.4 */
        /* Sangat kontras di background hijau, dan tetap terlihat elegan di area putih */
        .decor-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.4) !important; 
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.05)); /* Efek bayangan tipis agar timbul */
            transition: all 0.5s ease;
        }

        /* Penataan Posisi Grid Sesuai Hamparan Layer Screen Tablet Teteh */
        .icon-pos-1 { top: 10%; left: 8%; font-size: 4.5rem; animation: floatLoopA 7s ease-in-out infinite; }
        .icon-pos-2 { top: 22%; right: 10%; font-size: 3.5rem; animation: floatLoopB 9s ease-in-out infinite; }
        .icon-pos-3 { top: 45%; left: 6%; font-size: 3rem; animation: floatLoopB 8s ease-in-out infinite; }
        .icon-pos-4 { top: 14%; right: 28%; font-size: 3.8rem; animation: floatLoopA 11s ease-in-out infinite; }

        /* Area Bawah (Sangat Terang Menembus Hamparan Hijau) */
        .icon-pos-5 { bottom: 28%; left: 12%; font-size: 4rem; animation: floatLoopA 8s ease-in-out infinite; }
        .icon-pos-6 { bottom: 14%; left: 26%; font-size: 3rem; animation: floatLoopB 7s ease-in-out infinite; }
        .icon-pos-7 { bottom: 24%; right: 14%; font-size: 4.5rem; animation: floatLoopB 9s ease-in-out infinite; }
        .icon-pos-8 { bottom: 12%; right: 28%; font-size: 3.5rem; animation: floatLoopA 12s ease-in-out infinite; }

        /* Animasi Loop Berjalan (Floating Wave Effect) */
        @keyframes floatLoopA {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(6deg) scale(1.03); }
        }

        @keyframes floatLoopB {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(20px) rotate(-10deg) scale(0.97); }
        }

        /* Kunci Z-Index Box Kontainer Utama agar Tetap Terdepan */
        .nsa-container {
            position: relative;
            z-index: 10;
        }

        /* ========================================================================= */
        /* STYLE ASLI TETEHA (TETAP DIAMANKAN)                                       */
        /* ========================================================================= */
        .animate-portal-in { animation: portalMasuk 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pulse-logo { animation: logoPulse 3s ease-in-out infinite; transition: transform 0.3s ease; }
        .pulse-logo:hover { transform: scale(1.05) rotate(3deg); }
        .animate-text-delay-1 { opacity: 0; animation: teksMuncul 0.5s ease forwards 0.2s; }
        .animate-text-delay-2 { opacity: 0; animation: teksMuncul 0.5s ease forwards 0.3s; }
        .btn-unit { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important; position: relative; overflow: hidden; }
        .btn-unit:hover, .btn-unit:active { transform: translateY(-2px); box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15); }
        .btn-unit:active { transform: translateY(1px) scale(0.98); }
        .btn-unit:hover .style-icon, .btn-unit:active .style-icon { animation: ikonGoyang 0.5s ease-in-out; }
        .style-icon { font-size: 16px; transition: transform 0.3s ease; }
        .btn-unit:hover .chevron-right, .btn-unit:active .chevron-right { transform: translateX(4px); color: currentColor; }
        .chevron-right { transition: transform 0.2s ease, color 0.2s ease; }

        @keyframes portalMasuk { 0% { opacity: 0; transform: translateY(30px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.05); } 50% { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.08); } }
        @keyframes teksMuncul { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes ikonGoyang { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg) scale(1.1); } 75% { transform: rotate(15deg) scale(1.1); } }
    </style>

    <script>
        function pilihUnitNSA(mode, targetUrl) {
            sessionStorage.setItem('nsa_active_mode', mode);
            window.location.href = targetUrl;
        }
    </script>

</body>
</html>
